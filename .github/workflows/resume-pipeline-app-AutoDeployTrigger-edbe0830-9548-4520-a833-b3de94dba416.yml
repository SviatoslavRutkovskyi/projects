name: Trigger auto deployment for resume-pipeline-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/resume-pipeline-app-AutoDeployTrigger-edbe0830-9548-4520-a833-b3de94dba416.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RESUMEPIPELINEAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RESUMEPIPELINEAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RESUMEPIPELINEAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: resumepipelineacr.azurecr.io
          registryUsername: ${{ secrets.RESUMEPIPELINEAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RESUMEPIPELINEAPP_REGISTRY_PASSWORD }}
          containerAppName: resume-pipeline-app
          resourceGroup: resume-pipeline-rg
          imageToBuild: resumepipelineacr.azurecr.io/resume-pipeline-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


