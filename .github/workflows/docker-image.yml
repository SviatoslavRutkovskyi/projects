name: Trigger auto deployment for resume-pipeline-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RESUMEPIPELINEAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RESUMEPIPELINEAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RESUMEPIPELINEAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: resumepipelineacr.azurecr.io
          registryUsername: ${{ secrets.RESUMEPIPELINEAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RESUMEPIPELINEAPP_REGISTRY_PASSWORD }}
          containerAppName: resume-pipeline-app
          resourceGroup: resume-pipeline-rg
          imageToBuild: resumepipelineacr.azurecr.io/resume-pipeline-app:${{ github.sha }}
